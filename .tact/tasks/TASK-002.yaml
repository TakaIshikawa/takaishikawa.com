description: Create a script that reads git commit history from local project
  repositories, analyzes recent activity (commits, file changes, branch
  activity), and generates structured summaries suitable for project
  descriptions. This should extract meaningful insights like feature additions,
  bug fixes, refactoring work, etc.
acceptanceCriteria:
  - Script can read git log from specified repository paths
  - Extracts commit messages, timestamps, and file change statistics
  - Groups commits by type (feature, fix, docs, refactor) based on conventional
    commit patterns or keywords
  - Generates a structured summary (JSON) with recent activity insights
  - "Handles edge cases: no commits, repository not found, permission errors"
  - Unit tests verify git parsing logic
