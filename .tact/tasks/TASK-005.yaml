description: "Create a main orchestration script that coordinates all
  components: reads configuration, analyzes git activity for each project,
  generates descriptions, updates HTML, and optionally commits changes. Also
  includes scheduling/automation setup (cron job, GitHub Actions, or similar)
  for daily execution."
acceptanceCriteria:
  - "Main script orchestrates the full workflow: config → analyze → generate →
    update"
